<style>
/* ===== ESTILOS GENERALES Y RESET ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Montserrat', 'Segoe UI', sans-serif;
}

body {
    background: #f5f7fa;
    padding-top: 150px; 
    overflow-x: hidden;
}

img {
    max-width: 100%;
    height: auto;
    border: 3px solid rgb(14, 232, 244);
    border-radius: 10px;
    padding: 5px;
    box-shadow: 0 0 15px rgba(5, 240, 244, 0.6);
}

/* ===== VIDEO DE FONDO ===== */
#videoFondo {
    position: fixed;
    top: 0;
    left: 0;
    min-width: 100%;
    min-height: 100%;
    object-fit: cover;
    z-index: -1;
}

/* ===== BARRA DE NAVEGACIÓN DINÁMICA ===== */
.navbar {
    position: fixed;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    width: 95%;
    max-width: 1560px;
    height: 120px;
    background: linear-gradient(-45deg, #ff0080, #7928ca, #2afadf, #4facfe);
    background-size: 300% 400%;
    animation: gradientMove 10s ease infinite;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 30px;
    border-radius: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,.20);
    transition: all .4s ease;
    z-index: 1000;
}

/* Navbar pequeña al hacer scroll */
.navbar.small {
    height: 85px;
    top: 0;
    width: 100%;
    border-radius: 0;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.logo img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgb(11, 10, 11);
    transition: transform .4s;
}

.navbar.small .logo img {
    width: 60px;
    height: 60px;
}

.titulo {
    color: white;
    text-align: center;
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 1px;
    width: 45%;
    text-transform: uppercase;
    text-shadow: 0 2px 4px rgba(0,0,0,0.4);
}

.navbar.small .titulo {
    font-size: 1.1rem;
}

/* ===== CUADRÍCULA DE DOS EN DOS PARA BOTONES ===== */
.acciones {
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* Crea 2 columnas iguales */
    gap: 8px; /* Espacio entre los botones */
    align-items: center;
    width: 280px; /* Ancho total del bloque de botones en PC */
}

.contacto-btn {
    border: none;
    padding: 8px 12px;
    border-radius: 20px;
    background: white;
    color: #7928ca;
    font-weight: bold;
    font-size: 13px;
    cursor: pointer;
    transition: .3s;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 32px;
}

.contacto-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 15px rgba(255,255,255,.5);
}

#playPause {
    height: 32px;
    padding: 6px 12px;
    background: linear-gradient(135deg, #b2151a, #d30c8a);
    color: white;
    font-size: 11px;
    font-weight: bold;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    transition: transform 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
}

#playPause:hover {
    transform: scale(1.05);
}

.social-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 32px;
    text-align: center;
    text-decoration: none;
    font-weight: bold;
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 20px;
    color: white;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.social-btn.facebook {
    background: #1877F2;
}

.social-btn.tiktok {
    background: #000000;
    border: 1px solid #25F4EE;
}

.social-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* ===== SECCIÓN TARJETAS INICIALES ===== */
.tarjetas-info {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    max-width: 1200px;
    margin: 30px auto;
    padding: 0 20px;
}

.tarjeta {
    flex: 1;
    min-width: 280px;
    max-width: 450px;
    text-align: center;
    position: relative;
}

.tarjeta img {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

.tarjeta button {
    width: 100%;
    background: #80d31b;
    color: #fff;
    border: none;
    padding: 15px;
    font-size: 18px;
    font-weight: bold;
    margin-top: 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background .3s;
}

.tarjeta button:hover {
    background: #0d47a1;
}

/* ===== CATEGORÍAS Y CAROUSEL ===== */
.categoria {
    padding: 30px 20px;
    max-width: 1400px;
    margin: 0 auto;
}

.menu {
    text-align: center;
    margin-bottom: 20px;
}

.menu button {
    padding: 12px 30px;
    font-size: 1.6rem;
    font-weight: bold;
    background: linear-gradient(135deg, #007BFF, #00C6FF);
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    animation: cambioColor 5s infinite alternate;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.menu button:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
}

@keyframes cambioColor {
    0%   { background: linear-gradient(135deg, #007BFF, #00C6FF); }
    25%  { background: linear-gradient(135deg, #FF5733, #FFC300); }
    50%  { background: linear-gradient(135deg, #28a745, #85e085); }
    75%  { background: linear-gradient(135deg, #6f42c1, #d63384); }
    100% { background: linear-gradient(135deg, #20c997, #0dcaf0); }
}

.carousel {
    overflow-x: auto;
    padding: 10px 0;
    scrollbar-width: none;
}
.carousel::-webkit-scrollbar {
    display: none;
}

.track {
    display: flex;
    gap: 15px;
    width: max-content;
    animation: slide 25s linear infinite;
}

.track:hover {
    animation-play-state: paused;
}

.track img {
    width: 300px;
    height: 200px;
    object-fit: cover;
    transition: .3s;
}

.track img:hover {
    transform: translateY(-5px) scale(1.02);
}

@keyframes slide {
    from { transform: translateX(0); }
    to { transform: translateX(-35%); }
}

/* ===== MODAL ===== */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.75);
    z-index: 2000;
    align-items: center;
    justify-content: center;
}

.modal-content {
    background: white;
    width: 90%;
    max-width: 450px;
    padding: 25px;
    border-radius: 20px;
    position: relative;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.modal-content h2 {
    text-align: center;
    color: #7928ca;
    margin-bottom: 20px;
}

.cerrar {
    position: absolute;
    right: 20px;
    top: 15px;
    font-size: 30px;
    cursor: pointer;
    color: #333;
}

.modal input, .modal button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 10px;
    font-size: 16px;
}

.modal button[type="submit"] {
    background: #007BFF;
    color: white;
    border: none;
    font-weight: bold;
    cursor: pointer;
    transition: background .3s;
}

.modal button[type="submit"]:hover {
    background: #0056b3;
}

/* ===== AJUSTES RESPONSIVOS MÓVIL (MÁXIMO 768px) ===== */
@media (max-width: 768px) {

    .titulo {

        letter-spacing: 0px;
    }

    .navbar.small .titulo {
        font-size: 0.7rem;
    }

    .acciones {
        width: 170px; /* Ancho ajustado para pantallas pequeñas */
        gap: 4px;
    }

    .contacto-btn, #playPause, .social-btn {
        font-size: 9px;
        height: 26px;
        padding: 4px 6px;
    }

    .tarjeta img {
        height: 200px;
    }

    .menu button {
        font-size: 1.2rem;
        padding: 10px 20px;
        width: 100%;
    }

    .track img {
        width: 220px;
        height: 150px;
    }
}
</style>

<!-- ===== SCRIPTS JAVASCRIPT ===== -->
<script>
// Manejo del scroll para la barra superior
window.addEventListener("scroll", () => {
    const navbar = document.getElementById("navbar");
    if(window.scrollY > 50){
        navbar.classList.add("small");
    }else{
        navbar.classList.remove("small");
    }
});

// Ventana de Contacto
const modal = document.getElementById("modal");

document.getElementById("abrirModal").onclick = () => {
    modal.style.display = "flex";
};

document.getElementById("cerrarX").onclick = () => {
    modal.style.display = "none";
};

window.onclick = (e) => {
    if(e.target === modal){
        modal.style.display = "none";
    }
};

// Control de la música de fondo
const boton = document.getElementById("playPause");
const musica = document.getElementById("musica");
let reproduciendo = false;

boton.addEventListener("click", () => {
    if (reproduciendo) {
        musica.pause();
        boton.textContent = "🎵 Música";
        reproduciendo = false;
    } else {
        musica.play();
        boton.textContent = "⏸ Pausar";
        reproduciendo = true;
    }
});
</script>
